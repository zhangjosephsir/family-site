<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大公主张越尔 - 张氏家庭网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #FFF8F0 0%, #FFE4D6 100%);
            min-height: 100vh;
            color: #5D4E37;
        }
        header {
            background: linear-gradient(135deg, #FFB6C1 0%, #FFC0CB 100%);
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(255, 182, 193, 0.4);
        }
        header h1 { color: #8B4513; font-size: 2em; margin-bottom: 5px; }
        header p { color: #A0522D; }
        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: rgba(255,255,255,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a {
            padding: 10px 20px;
            background: white;
            border-radius: 25px;
            text-decoration: none;
            color: #DB7093;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(219, 112, 147, 0.2);
            transition: all 0.3s ease;
        }
        nav a:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(219, 112, 147, 0.3); }
        nav a.active { background: linear-gradient(135deg, #FFB6C1, #FFC0CB); color: white; }
        main { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .back { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: white; border-radius: 20px; text-decoration: none; color: #DB7093; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .photo-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(139, 69, 19, 0.1);
            transition: transform 0.3s ease;
        }
        .photo-card:hover { transform: scale(1.02); }
        .photo-card img { width: 100%; height: 250px; object-fit: cover; }
        .photo-card .desc { padding: 15px; text-align: center; color: #A0522D; font-size: 0.95em; }
        footer { text-align: center; padding: 30px; background: linear-gradient(135deg, #FFC0CB, #FFB6C1); margin-top: 40px; color: #8B4513; }
        @media (max-width: 768px) {
            header h1 { font-size: 1.5em; }
            .photo-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
            .photo-card img { height: 180px; }
        }
    </style>
</head>
