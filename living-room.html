<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="baidu-site-verification" content="3e890b1283090f7419523a66aaff9ccf" 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客厅 - 张氏家庭网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #FFF8DC 0%, #FFE4B5 100%);
            min-height: 100vh;
            color: #5D4E37;
        }
        header {
            background: linear-gradient(135deg, #DEB887 0%, #D2B48C 100%);
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(222, 184, 135, 0.4);
        }
        header h1 { color: #5D4E37; font-size: 2em; margin-bottom: 5px; }
        header p { color: #8B7355; }
        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: rgba(255,255,255,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a {
            padding: 10px 20px;
            background: white;
            border-radius: 25px;
            text-decoration: none;
            color: #8B7355;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(139, 115, 85, 0.2);
            transition: all 0.3s ease;
        }
        nav a:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(139, 115, 85, 0.3); }
        nav a.active { background: linear-gradient(135deg, #DEB887, #D2B48C); color: white; }
        main { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .back { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: white; border-radius: 20px; text-decoration: none; color: #8B7355; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .photo-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(222, 184, 135, 0.1);
            transition: transform 0.3s ease;
        }
        .photo-card:hover { transform: scale(1.02); }
        .photo-card img { width: 100%; height: 250px; object-fit: cover; }
        .photo-card .desc { padding: 15px; text-align: center; color: #8B7355; font-size: 0.95em; }
        footer { text-align: center; padding: 30px; background: linear-gradient(135deg, #D2B48C, #DEB887); margin-top: 40px; color: #5D4E37; }
        @media (max-width: 768px) {
            header h1 { font-size: 1.5em; }
            .photo-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
            .photo-card img { height: 180px; }
        }
    </style>
</head>
