<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="baidu-site-verification" content="3e890b1283090f7419523a66aaff9ccf" 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爸爸张顺锋 - 张氏家庭网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #EFEBE9 0%, #D7CCC8 100%);
            min-height: 100vh;
            color: #5D4E37;
        }
        header {
            background: linear-gradient(135deg, #8D6E63 0%, #A1887F 100%);
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(141, 110, 99, 0.4);
        }
        header h1 { color: white; font-size: 2em; margin-bottom: 5px; }
        header p { color: #EFEBE9; }
        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: rgba(255,255,255,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a {
            padding: 10px 20px;
            background: white;
            border-radius: 25px;
            text-decoration: none;
            color: #6D4C41;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(109, 76, 65, 0.2);
            transition: all 0.3s ease;
        }
        nav a:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(109, 76, 65, 0.3); }
        nav a.active { background: linear-gradient(135deg, #8D6E63, #A1887F); color: white; }
        main { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .back { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: white; border-radius: 20px; text-decoration: none; color: #6D4C41; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .photo-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(141, 110, 99, 0.1);
            transition: transform 0.3s ease;
        }
        .photo-card:hover { transform: scale(1.02); }
        .photo-card img { width: 100%; height: 250px; object-fit: cover; }
        .photo-card .desc { padding: 15px; text-align: center; color: #6D4C41; font-size: 0.95em; }
        footer { text-align: center; padding: 30px; background: linear-gradient(135deg, #A1887F, #8D6E63); margin-top: 40px; color: white; }
        @media (max-width: 768px) {
            header h1 { font-size: 1.5em; }
            .photo-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
            .photo-card img { height: 180px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>👨 爸爸 · 张顺锋</h1>
        <p>家庭的顶梁柱</p>
    </header>
    
    <nav>
        <a href="index.html">🏠 首页</a>
        <a href="living-room.html">客厅</a>
        <a href="yueer.html">大公主</a>
        <a href="zhuoer.html">二公主</a>
        <a href="heer.html">王子</a>
        <a href="father.html" class="active">爸爸</a>
        <a href="mother.html">妈妈</a>
    </nav>
    
    <main>
        <a href="index.html" class="back">← 返回首页</a>
        
        <div class="photo-grid">
            <div class="photo-card">
                <img src="photos/father/01.jpg" alt="西装照1">
                <div class="desc">西装照1</div>
            </div>
            <div class="photo-card">
                <img src="photos/father/father_suit_blue_tie.jpg" alt="黑西装蓝领带">
                <div class="desc">黑西装蓝领带</div>
            </div>
            <div class="photo-card">
                <img src="photos/father/father_waterfall_yellow_radiant.jpg" alt="黄衣Radiant瀑布照">
                <div class="desc">黄衣Radiant瀑布照</div>
            </div>
            <div class="photo-card">
                <img src="photos/father/father_city_rainbow.jpg" alt="双彩虹城景">
                <div class="desc">双彩虹城景</div>
            </div>
        </div>
    </main>
    
    <footer>
        <p>👨 张顺锋的专属相册</p>
    </footer>
</body>
</html>
